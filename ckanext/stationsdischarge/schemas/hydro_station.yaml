scheming_version: 2
dataset_type: hydro_station
about: "Hydrometric station configuration for ThingsBoard IoT integration with multi-key telemetry."
about_url: https://github.com/pabrojast/ckanext-stationsdischarge

form_languages: ["en", "es", "fr"]
required_language: "en"

schema_version: 2.0
schema_date: 2025-07-14
schema_name: hydro_station
schema_title: Hydrometric Station
schema_description: Schema for hydrometric stations with ThingsBoard connectivity and multi-key telemetry support.

schema_form_groups:
  # ── Dataset form page ──────────────────────────────
  - form_group_id: station_identity
    label:
      en: Station Identification
      es: Identificación de la Estación
      fr: Identification de la Station
    fa_icon: fa-id-card

  - form_group_id: station_location
    label:
      en: Location
      es: Ubicación
      fr: Localisation
    fa_icon: fa-map-marker

  - form_group_id: iot_connection
    label:
      en: IoT Sensor Connection
      es: Conexión del Sensor IoT
      fr: Connexion du Capteur IoT
    fa_icon: fa-plug

  # ── Resource form page ─────────────────────────────
  - form_group_id: resource_title
    label:
      en: Title
      es: Título
      fr: Titre
    fa_icon: fa-sticky-note

  - form_group_id: resource_details
    label:
      en: Resource Details
      es: Detalles del Recurso
      fr: Détails de la Ressource
    fa_icon: fa-file


# ══════════════════════════════════════════════════════
#  DATASET FIELDS
# ══════════════════════════════════════════════════════
dataset_fields:

# ── Group: Station Identification ────────────────────

# Station name (M)
- field_name: title
  label:
    en: Station Name
    es: Nombre de la Estación
    fr: Nom de la Station
  preset: title
  required: true
  form_placeholder:
    en: "e.g. Río Maipo – Puente El Manzano"
    es: "ej. Río Maipo – Puente El Manzano"
    fr: "ex. Río Maipo – Puente El Manzano"
  form_group_id: station_identity

# URL slug (M – auto)
- field_name: name
  label:
    en: URL
    es: URL
    fr: URL
  preset: dataset_slug
  form_placeholder: "e.g. est-rio-maipo-puente-manzano"
  form_group_id: station_identity

# Station ID (M) – unique identifier
- field_name: station_id
  label:
    en: Station ID
    es: ID de Estación
    fr: ID de la Station
  required: true
  validators: "not_empty unicode_safe"
  form_placeholder:
    en: "e.g. EST-MAIPO-001"
    es: "ej. EST-MAIPO-001"
    fr: "ex. EST-MAIPO-001"
  help_text:
    en: "Unique identifier for this station."
    es: "Identificador único de esta estación."
    fr: "Identifiant unique de cette station."
  form_group_id: station_identity

# Organization (M)
- field_name: owner_org
  label:
    en: Organization
    es: Organización
    fr: Organisation
  preset: dataset_organization
  required: true
  form_group_id: station_identity

# Station status (M)
- field_name: station_status
  label:
    en: Station Status
    es: Estado de la Estación
    fr: État de la Station
  preset: select
  required: true
  form_include_blank_choice: false
  choices:
    - label:
        en: Active
        es: Activa
        fr: Active
      value: active
    - label:
        en: Inactive
        es: Inactiva
        fr: Inactive
      value: inactive
    - label:
        en: Maintenance
        es: En Mantenimiento
        fr: En Maintenance
      value: maintenance
  form_group_id: station_identity

# Description (O)
- field_name: notes
  label:
    en: Description
    es: Descripción
    fr: Description
  form_snippet: markdown.html
  form_group_id: station_identity

# Tags (O)
- field_name: tag_string
  label:
    en: Tags
    es: Etiquetas
    fr: Mots-clés
  preset: tag_string_autocomplete
  form_group_id: station_identity


# ── Group: Location ──────────────────────────────────

# Latitude (M)
- field_name: latitude
  label:
    en: Latitude
    es: Latitud
    fr: Latitude
  required: true
  validators: "not_empty"
  form_placeholder: "-33.5982"
  help_text:
    en: "Decimal degrees (WGS 84). Range: −90 to 90."
    es: "Grados decimales (WGS 84). Rango: −90 a 90."
    fr: "Degrés décimaux (WGS 84). Plage : −90 à 90."
  form_group_id: station_location

# Longitude (M)
- field_name: longitude
  label:
    en: Longitude
    es: Longitud
    fr: Longitude
  required: true
  validators: "not_empty"
  form_placeholder: "-70.3451"
  help_text:
    en: "Decimal degrees (WGS 84). Range: −180 to 180."
    es: "Grados decimales (WGS 84). Rango: −180 a 180."
    fr: "Degrés décimaux (WGS 84). Plage : −180 à 180."
  form_group_id: station_location

# Spatial GeoJSON (auto-generated from lat/lon)
- field_name: spatial
  label:
    en: Spatial Extent
    es: Extensión Espacial
    fr: Étendue Spatiale
  preset: spatial
  form_placeholder: '{"type": "Point", "coordinates": [-70.3451, -33.5982]}'
  help_text:
    en: 'Auto-generated GeoJSON from latitude/longitude.'
    es: 'GeoJSON auto-generado desde latitud/longitud.'
    fr: 'GeoJSON auto-généré à partir de la latitude/longitude.'
  form_group_id: station_location

# River name (O)
- field_name: river_name
  label:
    en: River / Water Body
    es: Río / Cuerpo de Agua
    fr: Rivière / Plan d'Eau
  validators: "ignore_missing unicode_safe"
  form_group_id: station_location

# Basin name (O)
- field_name: basin_name
  label:
    en: Basin
    es: Cuenca
    fr: Bassin Versant
  validators: "ignore_missing unicode_safe"
  form_group_id: station_location

# Country (O)
- field_name: country
  label:
    en: Country
    es: País
    fr: Pays
  validators: "ignore_missing unicode_safe"
  form_group_id: station_location

# Elevation (O)
- field_name: elevation_masl
  label:
    en: Elevation (m a.s.l.)
    es: Elevación (m s.n.m.)
    fr: Altitude (m)
  validators: "ignore_missing"
  form_group_id: station_location


# ── Group: IoT Sensor Connection ─────────────────────

# ThingsBoard entity ID (M)
- field_name: thingsboard_entity_id
  label:
    en: ThingsBoard Entity ID
    es: ID de Entidad ThingsBoard
    fr: ID d'Entité ThingsBoard
  required: true
  validators: "not_empty unicode_safe"
  form_placeholder: "784f394c-42b6-11ec-81d3-0242ac130003"
  help_text:
    en: 'UUID of the device in ThingsBoard. Use the "Fetch from ThingsBoard" button to auto-fill station metadata.'
    es: 'UUID del dispositivo en ThingsBoard. Use el botón "Obtener de ThingsBoard" para auto-completar los metadatos.'
    fr: 'UUID de l''appareil dans ThingsBoard. Utilisez le bouton "Récupérer de ThingsBoard" pour remplir automatiquement.'
  help_allow_html: true
  form_group_id: iot_connection

# ThingsBoard device ID (O)
- field_name: thingsboard_device_id
  label:
    en: ThingsBoard Device ID
    es: ID de Dispositivo ThingsBoard
    fr: ID d'Appareil ThingsBoard
  validators: "ignore_missing unicode_safe"
  help_text:
    en: "Only if the device ID differs from the entity ID above."
    es: "Solo si el ID de dispositivo difiere del ID de entidad anterior."
    fr: "Uniquement si l'ID de l'appareil diffère de l'ID d'entité ci-dessus."
  form_group_id: iot_connection

# NOTE: Telemetry keys are stored in a separate table (station_telemetry_keys)
# and managed via the station form's dynamic key rows + TB metadata fetch.
# Each key has: telemetry_key, label, unit, variable_type, sort_order


# ══════════════════════════════════════════════════════
#  RESOURCE FIELDS
# ══════════════════════════════════════════════════════
resource_fields:

# Resource URL / upload (M)
- field_name: url
  label:
    en: Resource URL / File
    es: URL / Archivo del Recurso
    fr: URL / Fichier de la Ressource
  preset: resource_url_upload
  form_group_id: resource_title

# Resource name (O)
- field_name: name
  label:
    en: Name
    es: Nombre
    fr: Nom
  form_group_id: resource_title

# Resource description (O)
- field_name: description
  label:
    en: Description
    es: Descripción
    fr: Description
  form_snippet: markdown.html
  form_group_id: resource_details

# Resource format (O)
- field_name: format
  label:
    en: Format
    es: Formato
    fr: Format
  preset: resource_format_autocomplete
  form_group_id: resource_details
